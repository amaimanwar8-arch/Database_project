<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - HorrorVerse</title>
  <link rel="stylesheet" href="sidebar.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cinzel', serif;
    }

    body {
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .edit-container {
      max-width: 600px;
      margin: 80px auto 50px;
      background: rgba(20,0,0,0.85);
      padding: 30px 40px;
      border-radius: 15px;
      border: 2px solid crimson;
      box-shadow: 0 0 25px crimson;
      position: relative;
      z-index: 1;
    }

    .edit-container h1 {
      text-align: center;
      color: #ff4444;
      font-size: 2.2rem;
      margin-bottom: 25px;
      text-shadow: 0 0 10px crimson;
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .edit-form label {
      font-weight: bold;
      color: #ff6666;
      font-size: 1.1rem;
    }

    .edit-form input {
      padding: 10px 15px;
      font-size: 1rem;
      border-radius: 8px;
      border: 2px solid crimson;
      background: rgba(0,0,0,0.7);
      color: #fff;
      outline: none;
      transition: 0.3s;
    }

    .edit-form input:focus {
      border-color: #ff4444;
      box-shadow: 0 0 10px crimson;
    }

    .save-btn {
      padding: 12px;
      font-weight: bold;
      color: #fff;
      background: crimson;
      border: 2px solid #ff4444;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .save-btn:hover {
      background: #ff4444;
      box-shadow: 0 0 15px crimson;
    }

    footer {
      text-align: center;
      padding: 15px 0;
      background: rgba(20,0,0,0.85);
      border-top: 2px solid crimson;
      box-shadow: 0 0 10px crimson;
      position: relative;
      z-index: 1;
      margin-top: 50px;
    }

    .navbar {
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body>
<nav class="navbar">
  <button class="menu-icon" onclick="openNav()">☰</button>
  <div class="logo" onclick="window.location.href='index.html'">
    💀 HorrorVerse
  </div>
</nav>


  <!-- Edit Profile Section -->
  <div class="edit-container">
    <h1>Edit Profile</h1>
    <form class="edit-form" id="editProfileForm">
      <label for="name">Name</label>
      <input type="text" id="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" required>

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" required>

      <label for="membership">Membership</label>
      <input type="text" id="membership" readonly>

      <button type="submit" class="save-btn">Save Changes</button>
    </form>
  </div>

  <footer>
    &copy; 2025 HorrorVerse | All Rights Reserved
  </footer>

  <script src="sidebar.js"></script>
  <script>
    // Pre-fill form with user data
    const userData = {
      name: "John Doe",
      email: "john@example.com",
      dob: "1990-07-25",
      membership: "Premium"
    };

    document.getElementById('name').value = userData.name;
    document.getElementById('email').value = userData.email;
    document.getElementById('dob').value = userData.dob;
    document.getElementById('membership').value = userData.membership;

    // Handle form submission
    document.getElementById('editProfileForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Here you would normally send the updated data to backend
      alert("Profile updated successfully!");
      // Optionally redirect back to profile page
      window.location.href = "profile.html";
    });
  </script>
</body>
</html>
