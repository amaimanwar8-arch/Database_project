<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Movies - HorrorVerse</title>
  <link rel="stylesheet" href="sidebar.css">
  <script src="sidebar.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cinzel', serif; }
    body {
      background: linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.92)),
                  url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=1920') center/cover fixed;
      min-height: 100vh; color: #fff;
    }
    .container { max-width: 1600px; margin: 0 auto; padding: 20px; }

    .header {
      text-align: center; padding: 60px 20px;
      background: rgba(20,0,0,0.95); border: 3px solid #dc143c;
      border-radius: 20px; margin: 30px 0; box-shadow: 0 10px 50px rgba(220,20,60,0.6);
    }
    .header h1 { font-size: 3.8rem; color: #ff3333; text-shadow: 0 0 30px #dc143c; }

    .controls {
      background: rgba(20,0,0,0.95); padding: 30px; border: 3px solid #dc143c;
      border-radius: 20px; margin-bottom: 40px; box-shadow: 0 10px 40px rgba(220,20,60,0.5);
    }
    .search-bar {
      display: flex; gap: 15px; margin-bottom: 25px;
    }
    .search-bar input {
      flex: 1; padding: 16px; border-radius: 15px; border: 2px solid #dc143c;
      background: rgba(0,0,0,0.8); color: #fff; font-size: 1.1rem;
    }
    .search-bar button {
      padding: 0 40px; background: #dc143c; border: 2px solid #dc143c;
      border-radius: 15px; color: white; font-weight: bold; cursor: pointer;
    }
    .filters {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
    }
    select, input {
      padding: 12px; border-radius: 10px; border: 2px solid #dc143c;
      background: rgba(0,0,0,0.8); color: #fff;
    }

    .results-info {
      display: flex; justify-content: space-between; align-items: center;
      margin: 30px 0; color: #ff6666; font-size: 1.2rem;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      padding: 20px 0;
    }
    .movie-card {
      background: rgba(15,0,0,0.95); border: 2px solid #dc143c;
      border-radius: 18px; overflow: hidden; cursor: pointer;
      transition: all 0.4s; box-shadow: 0 8px 30px rgba(220,20,60,0.4);
    }
    .movie-card:hover {
      transform: translateY(-15px) scale(1.03);
      box-shadow: 0 20px 60px rgba(220,20,60,0.8);
    }
    .movie-card img {
      width: 100%; height: 420px; object-fit: cover;
    }
    .info {
      padding: 20px;
    }
    .title {
      font-size: 1.6rem; color: #ff4444; margin-bottom: 10px;
      text-shadow: 0 0 10px #dc143c;
    }
    .meta {
      display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0;
      font-size: 0.95rem; color: #ff8888;
    }
    .desc {
      color: #ccc; line-height: 1.5; margin-bottom: 15px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .actions {
      display: flex; gap: 10px;
    }
    .btn {
      flex: 1; padding: 12px; text-align: center; border-radius: 10px;
      font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .fav-btn {
      background: rgba(220,20,60,0.3); border: 2px solid #dc143c;
      color: white;
    }
    .fav-btn.added {
      background: #27ae60; border-color: #27ae60;
    }
    .trailer-btn {
      background: #3498db; border: 2px solid #3498db; color: white;
    }
    .loading, .error {
      text-align: center; padding: 80px; font-size: 1.6rem;
    }
    .error { color: #e74c3c; }
  </style>
</head>
<body>

<nav class="navbar">
  <button class="menu-icon" onclick="openNav()">Menu</button>
  <div class="logo" onclick="window.location.href='user_home.html'">HorrorVerse</div>
</nav>

<div class="container">
  <div class="header">
    <h1>Browse All Horror Movies</h1>
    <p>Discover the darkest corners of cinema</p>
  </div>

  <div class="controls">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search title, description, genre...">
      <button onclick="applyFilters()">Search</button>
    </div>
    <div class="filters">
      <select id="genreFilter"><option value="">All Genres</option></select>
      <select id="yearFilter">
        <option value="">All Years</option>
        <option>2020s</option><option>2010s</option><option>2000s</option>
        <option>1990s</option><option>1980s</option><option>Before 1980</option>
      </select>
      <select id="ratingFilter">
        <option value="">Any Rating</option>
        <option value="9">9+</option>
        <option value="8">8+</option><option value="7">7+</option>
      </select>
      <select id="sortFilter">
        <option value="recent">Most Recent</option>
        <option value="title">Title A-Z</option>
        <option value="year">Year</option>
        <option value="rating">Rating</option>
      </select>
    </div>
  </div>

  <div class="results-info">
    <div id="resultsCount">Loading movies...</div>
  </div>

  <div class="movies-grid" id="moviesGrid">
    <div class="loading">Summoning horrors from the database...</div>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'user_login.html';

  let allMovies = [];
  let favorites = new Set();

  async function loadData() {
    try {
      const [moviesRes, favRes] = await Promise.all([
        fetch('/api/user/movies', { headers: { Authorization: `Bearer ${token}` } }),
        fetch('/api/user/favorites', { headers: { Authorization: `Bearer ${token}` } })
      ]);

      if (!moviesRes.ok) throw new Error('Failed to load movies');

      const movies = await moviesRes.json();
      allMovies = movies;

      const favData = await favRes.json();
      favData.forEach(f => favorites.add(f.movie_id));

      populateGenres();
      applyFilters();
    } catch (err) {
      document.getElementById('moviesGrid').innerHTML = `<div class="error">Error loading movies: ${err.message}</div>`;
    }
  }

  function populateGenres() {
    const select = document.getElementById('genreFilter');
    const genres = [...new Set(allMovies.map(m => m.genre).filter(Boolean))].sort();
    genres.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g; opt.textContent = g;
      select.appendChild(opt);
    });
  }

  function renderMovies(movies) {
    const grid = document.getElementById('moviesGrid');
    document.getElementById('resultsCount').textContent = `${movies.length} movies found`;

    if (movies.length === 0) {
      grid.innerHTML = '<div class="error">No movies found</div>';
      return;
    }

    grid.innerHTML = movies.map(m => `
      <div class="movie-card" onclick="goToDetails(${m.movie_id})">
        <img src="${m.poster_url || 'placeholder.jpg'}" alt="${m.title}">
        <div class="info">
          <div class="title">${m.title}</div>
          <div class="meta">
            <span>${m.year || '????'}</span>
            <span>${m.genre || 'Horror'}</span>
            <span>Rating: ${m.rating || '?.?'}/10</span>
          </div>
          <div class="desc">${m.description ? m.description.substring(0, 120) + '...' : 'No description'}</div>
          <div class="actions" onclick="event.stopPropagation()">
            <button class="btn fav-btn ${favorites.has(m.movie_id) ? 'added' : ''}"
                    onclick="toggleFavorite(${m.movie_id}, this)">
              ${favorites.has(m.movie_id) ? 'In Favorites' : 'Add Favorite'}
            </button>
            <button class="btn trailer-btn" onclick="watchTrailer('${m.title}')">
              Watch Trailer
            </button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function applyFilters() {
    let filtered = [...allMovies];

    // Search
    const query = document.getElementById('searchInput').value.toLowerCase();
    if (query) {
      filtered = filtered.filter(m =>
        m.title.toLowerCase().includes(query) ||
        (m.description && m.description.toLowerCase().includes(query)) ||
        (m.genre && m.genre.toLowerCase().includes(query))
      );
    }

    // Genre
    const genre = document.getElementById('genreFilter').value;
    if (genre) filtered = filtered.filter(m => m.genre === genre);

    // Year
    const year = document.getElementById('yearFilter').value;
    if (year) {
      if (year === '2020s') filtered = filtered.filter(m => m.year >= 2020);
      else if (year === '2010s') filtered = filtered.filter(m => m.year >= 2010 && m.year < 2020);
      else if (year === '2000s') filtered = filtered.filter(m => m.year >= 2000 && m.year < 2010);
      else if (year === '1990s') filtered = filtered.filter(m => m.year >= 1990 && m.year <2000);
      else if (year === '1980s') filtered = filtered.filter(m => m.year >= 1980 && m.year <1990);
      else if (year === 'Before 1980') filtered = filtered.filter(m => m.year < 1980);
    }

    // Rating
    const rating = document.getElementById('ratingFilter').value;
    if (rating) filtered = filtered.filter(m => m.rating >= parseFloat(rating));

    // Sort
    const sort = document.getElementById('sortFilter').value;
    if (sort === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));
    else if (sort === 'year') filtered.sort((a,b) => b.year - a.year);
    else if (sort === 'rating') filtered.sort((a,b) => (b.rating||0) - (a.rating||0));
    // 'recent' = default (by created_at DESC from DB)

    renderMovies(filtered);
  }

  async function toggleFavorite(movieId, button) {
    if (favorites.has(movieId)) {
      // You can implement DELETE later — for now just visual remove
      alert("Remove from favorites coming soon!");
      return;
    }

    try {
      const res = await fetch('/api/user/favorites', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ movie_id: movieId })
      });

      if (res.ok) {
        favorites.add(movieId);
        button.classList.add('added');
        button.textContent = 'In Favorites';
        alert('Added to favorites!');
      } else {
        alert('Already in favorites or error');
      }
    } catch (e) {
      alert('Failed to add');
    }
  }

  function goToDetails(id) {
    window.location.href = `moviedetails.html?id=${id}`;
  }

  function watchTrailer(title) {
    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(title + " official trailer")}`, '_blank');
  }

  // Search on Enter
  document.getElementById('searchInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') applyFilters();
  });

  // Load everything
  loadData();
</script>
</body>
</html>
