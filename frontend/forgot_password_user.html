<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Password Reset - HorrorVerse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cinzel', serif; }

    body {
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(3px);
      z-index: 0;
    }

    .box {
      position: relative;
      z-index: 1;
      background: rgba(20,0,0,0.85);
      padding: 40px 35px;
      border-radius: 20px;
      border: 2px solid crimson;
      box-shadow: 0 0 30px crimson;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h1 { color: #ff4444; margin-bottom: 20px; text-shadow: 0 0 10px crimson; }

    input[type="email"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid crimson;
      background: rgba(255,255,255,0.07);
      color: #fff;
      margin-bottom: 20px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: crimson;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #ff4444; box-shadow: 0 0 15px crimson; }

    p { margin-top: 20px; }
    a { color: #ff4444; text-decoration: none; }
    a:hover { color: #fff; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="box">
    <h1>User Password Reset</h1>
    <p>Enter your email to receive a reset link.</p>

    <form id="resetFormUser">
      <input type="email" id="userEmail" placeholder="Your email" required>
      <button type="submit">Send Reset Link</button>
    </form>

    <p><a href="user_login.html">Back to Login</a></p>
  </div>

  <script>
    document.getElementById('resetFormUser').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('userEmail').value.trim();
      alert("A password reset link has been sent to: " + email);
      window.location.href = "user_login.html";
    });
  </script>
</body>
</html>
