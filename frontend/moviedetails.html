<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - HorrorVerse</title>
  <link rel="stylesheet" href="sidebar.css">
  <script src="sidebar.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cinzel', serif; }
    body {
      background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)),
                  url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=1920') center/cover fixed;
      min-height: 100vh; color: #fff; overflow-x: hidden; position: relative;
    }
    .detail-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
    .back-button {
      display: inline-flex; align-items: center; gap: 10px; padding: 12px 24px;
      background: rgba(220,20,60,0.3); border: 2px solid #dc143c; border-radius: 10px;
      color: #fff; cursor: pointer; margin-bottom: 30px; transition: all 0.3s;
      font-weight: bold;
    }
    .back-button:hover { background: #dc143c; transform: translateX(-5px); }
    .movie-hero {
      display: grid; grid-template-columns: 450px 1fr; gap: 50px;
      background: rgba(20,0,0,0.95); border: 3px solid #dc143c; border-radius: 25px;
      padding: 40px; box-shadow: 0 10px 60px rgba(220,20,60,0.6);
    }
    .movie-poster { 
      width: 100%; height: 650px; object-fit: cover; border-radius: 20px; 
      border: 3px solid #dc143c; box-shadow: 0 0 30px rgba(220,20,60,0.8);
    }
    .movie-details h1 { 
      font-size: 3.2rem; color: #ff4444; 
      text-shadow: 0 0 25px #dc143c; margin-bottom: 15px; 
    }
    .meta-item { 
      background: rgba(220,20,60,0.2); padding: 8px 16px; border-radius: 10px; 
      display: inline-block; margin-right: 12px; margin-bottom: 12px;
    }
    .synopsis { 
      font-size: 1.1rem; line-height: 1.7; color: #ddd; margin: 25px 0; 
    }
    .action-buttons { 
      display: flex; gap: 20px; flex-wrap: wrap; margin-top: 30px; 
    }
    .btn {
      padding: 16px 32px; border: 2px solid #dc143c; border-radius: 15px;
      background: rgba(220,20,60,0.3); color: #fff; font-weight: bold;
      cursor: pointer; transition: all 0.4s; font-size: 1.1rem;
    }
    .btn:hover { background: #dc143c; transform: translateY(-4px); box-shadow: 0 8px 25px rgba(220,20,60,0.6); }
    .btn-success { background: #2ecc71 !important; border-color: #2ecc71 !important; }
    .loading, .error-msg { text-align: center; padding: 100px; font-size: 1.6rem; }
    .error-msg { color: #e74c3c; }
    @media (max-width: 968px) {
      .movie-hero { grid-template-columns: 1fr; text-align: center; }
      .movie-poster { height: 500px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <button class="menu-icon" onclick="openNav()">Menu</button>
  <div class="logo" onclick="window.location.href='user_home.html'">HorrorVerse</div>
</nav>

<div class="detail-container">
  <button class="back-button" onclick="history.back()">Back to Browse</button>
  
  <div id="movieContent" class="loading">Loading terrifying details...</div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const movieId = urlParams.get('id');
  const token = localStorage.getItem('token');

  // Redirect if not logged out or no movie selected
  if (!token) {
    alert('Please login first!');
    window.location.href = 'user_login.html';
  }
  if (!movieId) {
    document.getElementById('movieContent').innerHTML = '<p class="error-msg">Invalid movie ID!</p>';
  }

  let movie = null;
  let isFavorite = false;

  async function loadMovieDetails() {
    try {
      // Step 1: Get the full movie list
      const res = await fetch('/api/user/movies', {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!res.ok) throw new Error('Failed to fetch movies');

      const movies = await res.json();
      movie = movies.find(m => m.movie_id === parseInt(movieId));

      if (!movie) throw new Error('Movie not found');

      // Step 2: Check if it's already in favorites
      const favRes = await fetch('/api/user/favorites', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const favorites = await favRes.json();
      isFavorite = favorites.some(f => f.movie_id === movie.movie_id);

      renderMovie();
    } catch (err) {
      document.getElementById('movieContent').innerHTML = 
        `<p class="error-msg">Error: ${err.message || 'Could not load movie'}</p>`;
    }
  }

  function renderMovie() {
    document.getElementById('movieContent').innerHTML = `
      <div class="movie-hero">
        <img src="${movie.poster_url || 'background.png'}" alt="${movie.title}" class="movie-poster">
        <div class="movie-details">
          <h1>${movie.title} (${movie.year || '????'})</h1>
          <div>
            <span class="meta-item">Rating: ${movie.rating || 'N/A'}/10</span>
            <span class="meta-item">Year: ${movie.year || 'Unknown'}</span>
            ${movie.genre ? `<span class="meta-item">${movie.genre}</span>` : ''}
          </div>

          <h3 style="color:#ff6666; margin:30px 0 15px;">Synopsis</h3>
          <p class="synopsis">${movie.description || 'No description available yet... but it will scare you.'}</p>

          <div class="action-buttons">
            <button id="favBtn" class="btn ${isFavorite ? 'btn-success' : ''}" onclick="toggleFavorite()">
              ${isFavorite ? 'In Favorites' : 'Add to Favorites'}
            </button>
            <button class="btn" onclick="watchTrailer()">Watch Trailer</button>
          </div>
        </div>
      </div>
    `;
  }

  async function toggleFavorite() {
    const btn = document.getElementById('favBtn');
    try {
      if (isFavorite) {
        // Optional: add DELETE route later. For now just remove visually
        alert('Remove from favorites coming soon!');
        return;
      }

      const res = await fetch('/api/user/favorites', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ movie_id: movie.movie_id })
      });

      if (res.ok) {
        isFavorite = true;
        btn.classList.add('btn-success');
        btn.textContent = 'In Favorites';
        alert('Added to your favorites!');
      } else {
        const data = await res.json();
        alert(data.message || 'Already in favorites');
      }
    } catch (err) {
      alert('Error adding to favorites');
    }
  }

  function watchTrailer() {
    if (movie.trailer_url) {
      window.open(movie.trailer_url, '_blank');
    } else {
      const query = encodeURIComponent(movie.title + " official trailer");
      window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
    }
  }

  // Load on page ready
  loadMovieDetails();
</script>
</body>
</html>
