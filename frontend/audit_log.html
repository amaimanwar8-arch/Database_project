<script>const isAdmin = true;</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log - HorrorVerse</title>
  <link rel="stylesheet" href="sidebar.css">
  <script src="sidebar.js" defer></script>

  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cinzel', serif;
    }

    body {
      background: url('auditlog.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: -1;
      backdrop-filter: blur(3px);
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background-color: rgba(20,0,0,0.85);
      border-bottom: 2px solid crimson;
      box-shadow: 0 0 20px crimson;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .menu-btn {
      background: none;
      border: none;
      color: crimson;
      font-size: 1.8rem;
      cursor: pointer;
      text-shadow: 0 0 10px crimson;
      transition: 0.3s;
    }

    .menu-btn:hover {
      color: #fff;
      text-shadow: 0 0 15px crimson;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ff4444;
      text-shadow: 0 0 10px crimson;
    }



    /* Main dashboard */
    .dashboard {
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .dashboard h1 {
      font-size: 2.5rem;
      color: #ff4444;
      text-shadow: 0 0 10px crimson;
      margin-bottom: 30px;
    }

    /* Filter section */
    .filter-section {
      background: rgba(20,0,0,0.8);
      border: 2px solid crimson;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 0 20px crimson;
    }

    .filter-section h2 {
      color: #ff6666;
      text-shadow: 0 0 10px crimson;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }

    .filter-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 15px;
    }

    .filter-controls label {
      display: flex;
      flex-direction: column;
      color: #ddd;
      font-weight: bold;
    }

    .filter-controls select, .filter-controls input {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ff4444;
      background: rgba(255,255,255,0.05);
      color: #fff;
      margin-top: 5px;
    }

    .filter-actions {
      display: flex;
      gap: 10px;
    }

    .filter-btn {
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: rgba(220,20,60,0.8);
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .filter-btn:hover {
      background: crimson;
      box-shadow: 0 0 10px crimson;
    }

    /* Table */
    .table-container {
      overflow-x: auto;
      margin-top: 20px;
      border: 2px solid crimson;
      border-radius: 10px;
      box-shadow: 0 0 20px crimson;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    th {
      background: rgba(220,20,60,0.8);
      color: #fff;
      position: sticky;
      top: 0;
    }

    tr:nth-child(even) td {
      background: rgba(255,255,255,0.05);
    }

    tr:hover td {
      background: rgba(220,20,60,0.2);
    }

    .status-success {
      color: #2ecc71;
      font-weight: bold;
    }

    .status-failed {
      color: #ff4d4d;
      font-weight: bold;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      gap: 10px;
    }

    .pagination button {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background: rgba(220,20,60,0.8);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    .pagination button:hover:not(:disabled) {
      background: crimson;
      box-shadow: 0 0 10px crimson;
    }

    .pagination button:disabled {
      background: rgba(220,20,60,0.3);
      cursor: not-allowed;
    }

    .pagination span {
      color: #ddd;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px 0;
      background: rgba(20,0,0,0.85);
      border-top: 2px solid crimson;
      margin-top: 50px;
      box-shadow: 0 -2px 15px crimson;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 200;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(3px);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: rgba(20,0,0,0.95);
      border: 2px solid crimson;
      padding: 30px 40px;
      border-radius: 15px;
      text-align: center;
      color: #fff;
      box-shadow: 0 0 25px crimson;
      max-width: 500px;
      width: 90%;
    }

    .modal-buttons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .modal-buttons button {
      padding: 10px 20px;
      border: 2px solid crimson;
      border-radius: 10px;
      background: rgba(220,20,60,0.8);
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .modal-buttons button:hover {
      background: crimson;
      box-shadow: 0 0 15px crimson;
    }
  </style>
</head>
<body>


<nav class="navbar">
  <button class="menu-icon" onclick="openNav()">☰</button>
  <div class="logo" onclick="window.location.href='index.html'">
    💀 HorrorVerse
  </div>
</nav>

  <!-- Logout Confirmation Modal -->
  <div id="logoutModal" class="modal">
    <div class="modal-content">
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to logout?</p>
      <div class="modal-buttons">
        <button id="yesLogout">Yes</button>
        <button id="noLogout">No</button>
      </div>
    </div>
  </div>

  <div class="dashboard">
    <h1>Audit Log</h1>

    <!-- Filter Section -->
    <div class="filter-section">
      <h2>Filter Actions</h2>
      <div class="filter-controls">
        <label>
          Operation Type:
          <select id="operationFilter">
            <option value="all">All Operations</option>
            <option value="INSERT">INSERT</option>
            <option value="UPDATE">UPDATE</option>
            <option value="DELETE">DELETE</option>
            <option value="LOGIN">LOGIN</option>
            <option value="LOGOUT">LOGOUT</option>
          </select>
        </label>
        <label>
          Status:
          <select id="statusFilter">
            <option value="all">All Statuses</option>
            <option value="SUCCESS">Success</option>
            <option value="FAILED">Failed</option>
          </select>
        </label>
        <label>
          Date From:
          <input type="date" id="dateFrom">
        </label>
        <label>
          Date To:
          <input type="date" id="dateTo">
        </label>
      </div>
      <div class="filter-actions">
        <button class="filter-btn" onclick="applyFilters()">Apply Filters</button>
        <button class="filter-btn" onclick="resetFilters()">Reset Filters</button>
        <button class="filter-btn" onclick="exportLogs()">Export to CSV</button>
      </div>
    </div>

    <!-- Audit Log Table -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Log ID</th>
            <th>Timestamp</th>
            <th>Operation</th>
            <th>Details</th>
            <th>Affected Rows</th>
            <th>Status</th>
            <th>User ID</th>
          </tr>
        </thead>
        <tbody id="auditTableBody">
          <!-- Table rows will be populated by JavaScript -->
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <button id="prevPage" onclick="changePage(-1)">Previous</button>
      <span id="pageInfo">Page 1 of 5</span>
      <button id="nextPage" onclick="changePage(1)">Next</button>
    </div>
  </div>

  <footer>
    &copy; 2025 HorrorVerse. All Rights Reserved.
  </footer>

  <script>
    // Sample audit log data
    const auditLogs = [
      { log_id: 1001, operation: "INSERT", details: "Added new movie 'The Haunting'", affected_rows: 1, action_status: "SUCCESS", log_creation_at: "2025-04-10 14:30:25", user_id: 5 },
      { log_id: 1002, operation: "UPDATE", details: "Updated user profile for ID 23", affected_rows: 1, action_status: "SUCCESS", log_creation_at: "2025-04-10 12:15:42", user_id: 3 },
      { log_id: 1003, operation: "DELETE", details: "Removed movie 'Dark Shadows'", affected_rows: 1, action_status: "SUCCESS", log_creation_at: "2025-04-09 18:45:10", user_id: 5 },
      { log_id: 1004, operation: "LOGIN", details: "Admin login from IP 192.168.1.5", affected_rows: 0, action_status: "SUCCESS", log_creation_at: "2025-04-09 09:20:33", user_id: 2 },
      { log_id: 1005, operation: "UPDATE", details: "Failed to update movie rating", affected_rows: 0, action_status: "FAILED", log_creation_at: "2025-04-08 16:55:17", user_id: 4 },
      { log_id: 1006, operation: "INSERT", details: "Added new user 'jane_doe'", affected_rows: 1, action_status: "SUCCESS", log_creation_at: "2025-04-08 11:30:05", user_id: 3 },
      { log_id: 1007, operation: "LOGOUT", details: "Admin logout", affected_rows: 0, action_status: "SUCCESS", log_creation_at: "2025-04-07 20:10:48", user_id: 2 },
      { log_id: 1008, operation: "DELETE", details: "Removed expired user accounts", affected_rows: 3, action_status: "SUCCESS", log_creation_at: "2025-04-07 14:25:36", user_id: 5 },
      { log_id: 1009, operation: "UPDATE", details: "Changed movie availability status", affected_rows: 5, action_status: "SUCCESS", log_creation_at: "2025-04-06 10:40:22", user_id: 4 },
      { log_id: 1010, operation: "LOGIN", details: "Failed login attempt for user ID 12", affected_rows: 0, action_status: "FAILED", log_creation_at: "2025-04-05 17:05:59", user_id: 12 },
      { log_id: 1011, operation: "INSERT", details: "Added new horror category 'Supernatural'", affected_rows: 1, action_status: "SUCCESS", log_creation_at: "2025-04-05 13:15:41", user_id: 3 },
      { log_id: 1012, operation: "UPDATE", details: "Updated website theme settings", affected_rows: 1, action_status: "SUCCESS", log_creation_at: "2025-04-04 19:30:14", user_id: 2 },
      { log_id: 1013, operation: "DELETE", details: "Removed duplicate movie entries", affected_rows: 2, action_status: "SUCCESS", log_creation_at: "2025-04-04 08:50:27", user_id: 5 },
      { log_id: 1014, operation: "LOGIN", details: "Admin login from IP 192.168.1.10", affected_rows: 0, action_status: "SUCCESS", log_creation_at: "2025-04-03 15:20:33", user_id: 2 },
      { log_id: 1015, operation: "UPDATE", details: "Failed to update user permissions", affected_rows: 0, action_status: "FAILED", log_creation_at: "2025-04-03 11:45:19", user_id: 4 }
    ];

    let currentPage = 1;
    const logsPerPage = 5;
    let filteredLogs = [...auditLogs];

    // Initialize the page
    document.addEventListener('DOMContentLoaded', function() {
      renderTable();
      setupLogoutModal();
    });

    // Render the audit log table
    function renderTable() {
      const tableBody = document.getElementById('auditTableBody');
      tableBody.innerHTML = '';

      const startIndex = (currentPage - 1) * logsPerPage;
      const endIndex = startIndex + logsPerPage;
      const logsToShow = filteredLogs.slice(startIndex, endIndex);

      logsToShow.forEach(log => {
        const row = document.createElement('tr');
        
        const statusClass = log.action_status === 'SUCCESS' ? 'status-success' : 'status-failed';
        
        row.innerHTML = `
          <td>${log.log_id}</td>
          <td>${formatDateTime(log.log_creation_at)}</td>
          <td>${log.operation}</td>
          <td>${log.details}</td>
          <td>${log.affected_rows}</td>
          <td class="${statusClass}">${log.action_status}</td>
          <td>${log.user_id}</td>
        `;
        
        tableBody.appendChild(row);
      });

      updatePagination();
    }

    // Format date and time for display
    function formatDateTime(dateTimeString) {
      const date = new Date(dateTimeString);
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    // Update pagination controls
    function updatePagination() {
      const totalPages = Math.ceil(filteredLogs.length / logsPerPage);
      document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
      
      document.getElementById('prevPage').disabled = currentPage === 1;
      document.getElementById('nextPage').disabled = currentPage === totalPages;
    }

    // Change page
    function changePage(direction) {
      const totalPages = Math.ceil(filteredLogs.length / logsPerPage);
      currentPage += direction;
      
      if (currentPage < 1) currentPage = 1;
      if (currentPage > totalPages) currentPage = totalPages;
      
      renderTable();
    }

    // Apply filters
    function applyFilters() {
      const operationFilter = document.getElementById('operationFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;
      
      filteredLogs = auditLogs.filter(log => {
        // Operation filter
        if (operationFilter !== 'all' && log.operation !== operationFilter) {
          return false;
        }
        
        // Status filter
        if (statusFilter !== 'all' && log.action_status !== statusFilter) {
          return false;
        }
        
        // Date filter
        if (dateFrom) {
          const logDate = new Date(log.log_creation_at).toISOString().split('T')[0];
          if (logDate < dateFrom) return false;
        }
        
        if (dateTo) {
          const logDate = new Date(log.log_creation_at).toISOString().split('T')[0];
          if (logDate > dateTo) return false;
        }
        
        return true;
      });
      
      currentPage = 1;
      renderTable();
    }

    // Reset filters
    function resetFilters() {
      document.getElementById('operationFilter').value = 'all';
      document.getElementById('statusFilter').value = 'all';
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value = '';
      
      filteredLogs = [...auditLogs];
      currentPage = 1;
      renderTable();
    }

    // Export logs to CSV
    function exportLogs() {
      let csvContent = "data:text/csv;charset=utf-8,";
      csvContent += "Log ID,Timestamp,Operation,Details,Affected Rows,Status,User ID\n";
      
      filteredLogs.forEach(log => {
        const row = [
          log.log_id,
          log.log_creation_at,
          log.operation,
          `"${log.details}"`,
          log.affected_rows,
          log.action_status,
          log.user_id
        ].join(',');
        csvContent += row + "\n";
      });
      
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "horrorverse_audit_log.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }



    // Logout modal functions
    function setupLogoutModal() {
      const logoutModal = document.getElementById("logoutModal");
      const yesLogout = document.getElementById("yesLogout");
      const noLogout = document.getElementById("noLogout");

      yesLogout.addEventListener("click", () => {
        window.location.href = "index.html"; 
      });

      noLogout.addEventListener("click", () => {
        logoutModal.style.display = "none";
      });
    }

    function showLogoutModal() {
      document.getElementById("logoutModal").style.display = "flex";
    }
  </script>
</body>
</html>
