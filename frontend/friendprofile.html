  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cinzel', serif;
    }

    body {
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                  url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=1920') center/cover fixed;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }



    .profile-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .profile-header {
      background: rgba(20,0,0,0.95);
      border: 3px solid #dc143c;
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 10px 60px rgba(220,20,60,0.6);
      margin-bottom: 40px;
      text-align: center;
      animation: slideDown 0.8s;
    }

    .profile-avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 5px solid #dc143c;
      margin: 0 auto 25px;
      object-fit: cover;
      box-shadow: 0 10px 40px rgba(220,20,60,0.7);
    }

    .online-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(46,204,113,0.3);
      border: 2px solid #2ecc71;
      padding: 8px 20px;
      border-radius: 20px;
      color: #2ecc71;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .offline-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(149,165,166,0.3);
      border: 2px solid #95a5a6;
      padding: 8px 20px;
      border-radius: 20px;
      color: #95a5a6;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .online-dot {
      width: 12px;
      height: 12px;
      background: #2ecc71;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .offline-dot {
      width: 12px;
      height: 12px;
      background: #95a5a6;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px #2ecc71; }
      50% { box-shadow: 0 0 20px #2ecc71; }
    }

    .profile-name {
      font-size: 2.5rem;
      color: #ff4444;
      text-shadow: 0 0 20px #dc143c;
      margin-bottom: 15px;
    }

    .profile-activity {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin-bottom: 30px;
    }

    .stat-box {
      text-align: center;
      padding: 20px;
      background: rgba(30,0,0,0.9);
      border: 2px solid rgba(220,20,60,0.5);
      border-radius: 15px;
      transition: all 0.3s;
    }

    .stat-box:hover {
      border-color: #dc143c;
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(220,20,60,0.5);
    }

    .stat-value {
      font-size: 2.5rem;
      color: #ff4444;
      font-weight: bold;
      text-shadow: 0 0 15px #dc143c;
    }

    .stat-label {
      color: #888;
      font-size: 1rem;
      margin-top: 10px;
    }

    .profile-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .profile-actions button {
      padding: 15px 35px;
      border: 2px solid #dc143c;
      border-radius: 15px;
      background: rgba(220,20,60,0.4);
      color: #fff;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .profile-actions button:hover {
      background: #dc143c;
      box-shadow: 0 0 20px #dc143c;
      transform: translateY(-3px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #dc143c, #8b0000) !important;
    }

    .btn-success {
      background: rgba(46,204,113,0.5) !important;
      border-color: #2ecc71 !important;
    }

    .btn-success:hover {
      background: #2ecc71 !important;
      box-shadow: 0 0 20px #2ecc71 !important;
    }

    .profile-section {
      background: rgba(20,0,0,0.95);
      border: 3px solid #dc143c;
      border-radius: 25px;
      padding: 35px;
      box-shadow: 0 10px 60px rgba(220,20,60,0.6);
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 2rem;
      color: #ff4444;
      text-shadow: 0 0 20px #dc143c;
      margin-bottom: 25px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .info-item {
      padding: 15px;
      background: rgba(30,0,0,0.9);
      border: 2px solid rgba(220,20,60,0.3);
      border-radius: 12px;
    }

    .info-label {
      color: #ff6666;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .info-value {
      color: #ccc;
      font-size: 1rem;
    }

    .favorite-movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }

    .movie-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #dc143c;
      transition: all 0.3s;
      cursor: pointer;
    }

    .movie-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(220,20,60,0.6);
    }

    .movie-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .movie-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      padding: 30px 10px 10px;
      color: #fff;
      font-size: 0.9rem;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: rgba(20,0,0,0.95);
      border-top: 3px solid #dc143c;
      box-shadow: 0 -5px 30px rgba(220,20,60,0.3);
      color: #888;
    }

    @keyframes slideDown {
      from { 
        opacity: 0;
        transform: translateY(-30px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .profile-stats {
        grid-template-columns: 1fr;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .profile-name {
        font-size: 2rem;
      }
    }
  </style>
</head>

    function loadProfile() {
      const urlParams = new URLSearchParams(window.location.search);
      const userId = urlParams.get('id');
      
      if (!userId) {
        document.getElementById('profileHeader').innerHTML = '<div style="padding: 60px 20px; text-align: center;"><h2 style="color: #ff4444; margin-bottom: 20px;">No User Selected</h2><p style="color: #888; margin-bottom: 30px;">Please select a friend to view their profile.</p><button onclick="window.location.href=\'friends.html\'" style="padding: 15px 30px; border: 2px solid #dc143c; border-radius: 15px; background: #dc143c; color: #fff; font-weight: bold; cursor: pointer;">Back to Friends</button></div>';
        return;
      }

      const user = usersDatabase[userId];
      
      if (!user) {
        document.getElementById('profileHeader').innerHTML = '<div style="padding: 60px 20px; text-align: center;"><h2 style="color: #ff4444; margin-bottom: 20px;">User Not Found</h2><p style="color: #888; margin-bottom: 30px;">This user profile does not exist.</p><button onclick="window.location.href=\'friends.html\'" style="padding: 15px 30px; border: 2px solid #dc143c; border-radius: 15px; background: #dc143c; color: #fff; font-weight: bold; cursor: pointer;">Back to Friends</button></div>';
        return;
      }

      document.title = user.name + ' - HorrorVerse';
      
      const statusBadge = user.status === 'online' ? '<div class="online-badge"><div class="online-dot"></div>Online Now</div>' : '<div class="offline-badge"><div class="offline-dot"></div>Offline</div>';

      document.getElementById('profileHeader').innerHTML = '<img src="' + user.avatar + '" alt="' + user.name + '" class="profile-avatar">' + statusBadge + '<h1 class="profile-name">' + user.name + '</h1><p class="profile-activity">' + user.activity + '</p><div class="profile-stats"><div class="stat-box"><div class="stat-value">' + user.movies + '</div><div class="stat-label">Movies Watched</div></div><div class="stat-box"><div class="stat-value">' + user.reviews + '</div><div class="stat-label">Reviews Written</div></div><div class="stat-box"><div class="stat-value">' + user.friends + '</div><div class="stat-label">Friends</div></div></div><div class="profile-actions"><button class="btn-primary" onclick="sendMessage(' + user.id + ')">Send Message</button><button class="btn-success" onclick="addFriend(' + user.id + ')">Add Friend</button><button onclick="window.location.href=\'friends.html\'">Back to Friends</button></div>';

      document.getElementById('profileInfo').innerHTML = '<div class="info-item"><div class="info-label">Email</div><div class="info-value">' + user.email + '</div></div><div class="info-item"><div class="info-label">Member Since</div><div class="info-value">' + user.memberSince + '</div></div><div class="info-item"><div class="info-label">Location</div><div class="info-value">' + user.location + '</div></div><div class="info-item"><div class="info-label">Favorite Genre</div><div class="info-value">' + user.favoriteGenre + '</div></div><div class="info-item" style="grid-column: 1 / -1;"><div class="info-label">Bio</div><div class="info-value">' + user.bio + '</div></div>';

      let moviesHTML = '';
      for(let i = 0; i < user.favoriteMovies.length; i++) {
        moviesHTML += '<div class="movie-item"><img src="' + user.favoriteMovies[i].image + '" alt="' + user.favoriteMovies[i].title + '"><div class="movie-title">' + user.favoriteMovies[i].title + '</div></div>';
      }
      document.getElementById('favoriteMovies').innerHTML = moviesHTML;
    }

    function sendMessage(userId) {
      const user = usersDatabase[userId];
      showNotification('Opening chat with ' + user.name + '...', '#3498db');
      sessionStorage.setItem('chatWith', JSON.stringify({
        id: user.id,
        name: user.name,
        avatar: user.avatar,
        status: user.status
      }));
      setTimeout(function() {
        window.location.href = 'messages.html';
      }, 1000);
    }

    function addFriend(userId) {
      const user = usersDatabase[userId];
      showNotification('Friend request sent to ' + user.name + '!', '#2ecc71');
    }

    function showNotification(message, color) {
      const notification = document.createElement('div');
      notification.textContent = message;
      notification.style.cssText = 'position: fixed; top: 100px; right: 30px; background: ' + color + '; color: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 1000; font-weight: bold;';
      document.body.appendChild(notification);
      setTimeout(function() {
        notification.style.opacity = '0';
        notification.style.transition = 'opacity 0.3s';
        setTimeout(function() {
          notification.remove();
        }, 300);
      }, 2500);
    }

    loadProfile();
